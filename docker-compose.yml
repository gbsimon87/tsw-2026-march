version: '3.9'

services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    ports:
      - '4000:4000'

  client:
    build:
      context: ./client
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo_data:
