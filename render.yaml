services:
  - type: web
    name: tsw-2026-march-api-prod
    plan: starter
    runtime: node
    branch: main
    autoDeployTrigger: off
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server build
    startCommand: pnpm --filter server start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: EMAIL_VERIFY_TTL_MINUTES
        value: 60
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: POSTHOG_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://app.posthog.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_GAME_SUMMARY_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_GAME_SUMMARY_TIMEOUT_MS
        value: 8000
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_TEAM_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ID_TEAM_SEASON
        sync: false
      - key: STRIPE_PRICE_ID_LEAGUE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ID_LEAGUE_SEASON
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: tsw/feed/prod
      - key: TEAM_LOGO_MAX_BYTES
        value: 2097152
      - key: FEED_IMAGE_MAX_BYTES
        value: 5242880
      - key: COOKIE_DOMAIN
        sync: false
      - key: AUTO_FEED_ENABLED
        sync: true

  - type: web
    name: tsw-2026-march-client-prod
    runtime: static
    branch: main
    autoDeployTrigger: off
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter client build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_NAME
        value: tsw-2026-march
      - key: VITE_APP_ENV
        value: production
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_ANALYTICS
        value: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://app.posthog.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

  - type: web
    name: tsw-2026-march-api-dev
    plan: free
    runtime: node
    branch: dev
    autoDeployTrigger: commit
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server build
    startCommand: pnpm --filter server start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: EMAIL_VERIFY_TTL_MINUTES
        value: 60
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: POSTHOG_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://app.posthog.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_GAME_SUMMARY_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_GAME_SUMMARY_TIMEOUT_MS
        value: 8000
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_TEAM_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ID_TEAM_SEASON
        sync: false
      - key: STRIPE_PRICE_ID_LEAGUE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ID_LEAGUE_SEASON
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: tsw/feed/dev
      - key: TEAM_LOGO_MAX_BYTES
        value: 2097152
      - key: FEED_IMAGE_MAX_BYTES
        value: 5242880
      - key: COOKIE_DOMAIN
        sync: false
      - key: AUTO_FEED_ENABLED
        value: true

  - type: web
    name: tsw-2026-march-client-dev
    runtime: static
    branch: dev
    autoDeployTrigger: commit
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter client build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_APP_NAME
        value: tsw-2026-march (Dev)
      - key: VITE_APP_ENV
        value: development
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_ANALYTICS
        value: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://app.posthog.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
