services:
  - type: web
    name: tsw-2026-march-api-prod
    plan: free
    runtime: node
    branch: main
    autoDeployTrigger: off
    rootDir: server
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: EMAIL_VERIFY_TTL_MINUTES
        value: 60
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: POSTHOG_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://app.posthog.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO_MONTHLY
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: tsw/feed/prod
      - key: TEAM_LOGO_MAX_BYTES
        value: 2097152
      - key: FEED_IMAGE_MAX_BYTES
        value: 5242880
      - key: COOKIE_DOMAIN
        sync: false

  - type: web
    name: tsw-2026-march-client-prod
    plan: free
    runtime: static
    branch: main
    autoDeployTrigger: off
    rootDir: client
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_NAME
        value: tsw-2026-march
      - key: VITE_APP_ENV
        value: production
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_ANALYTICS
        value: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://app.posthog.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false

  - type: web
    name: tsw-2026-march-api-dev
    plan: free
    runtime: node
    branch: dev
    autoDeployTrigger: commit
    rootDir: server
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: EMAIL_VERIFY_TTL_MINUTES
        value: 60
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 30
      - key: POSTHOG_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://app.posthog.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO_MONTHLY
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: tsw/feed/dev
      - key: TEAM_LOGO_MAX_BYTES
        value: 2097152
      - key: FEED_IMAGE_MAX_BYTES
        value: 5242880
      - key: COOKIE_DOMAIN
        sync: false

  - type: web
    name: tsw-2026-march-client-dev
    plan: free
    runtime: static
    branch: dev
    autoDeployTrigger: commit
    rootDir: client
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_APP_NAME
        value: tsw-2026-march (Dev)
      - key: VITE_APP_ENV
        value: development
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_ANALYTICS
        value: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        value: https://app.posthog.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
